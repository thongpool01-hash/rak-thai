            if (window.confirm("คุณต้องการออกจากระบบผู้ดูแลระบบใช่หรือไม่?")) {
              setIsAdmin(false);
              if (activeTab === 'settings') {
                setActiveTab('dashboard');
              }
              alert("ออกจากระบบสำเร็จ ตอนนี้คุณอยู่ในสถานะผู้ชมทั่วไป");
            }
          };

          const handleOpenAddModal = () => {
            if (!isAdmin) {
              alert("สิทธิ์เฉพาะผู้ดูแลระบบเท่านั้นที่จะสามารถเพิ่มข้อมูลได้");
              return;
            }
            setEditingReg(null);
            setFormState({
              school_name: '',
              activity_name: uniqueActivities[0] || INITIAL_ACTIVITIES[0],
              grade_level: 'ป. ๔-๖',
              activity_type: 'เดี่ยว',
              participant_count: 1,
              participant_names: '',
              teacher_names: '',
              score: ''
            });
            setIsModalOpen(true);
          };

          const handleOpenEditModal = (reg) => {
            if (!isAdmin) {
              alert("สิทธิ์เฉพาะผู้ดูแลระบบเท่านั้นที่จะสามารถแก้ไขข้อมูลได้");
              return;
            }
            setEditingReg(reg);
            setFormState({
              school_name: reg.school_name,
              activity_name: reg.activity_name,
              grade_level: reg.grade_level,
              activity_type: reg.activity_type,
              participant_count: reg.participant_count || 1,
              participant_names: reg.participant_names,
              teacher_names: reg.teacher_names,
              score: reg.score !== undefined && reg.score !== null ? reg.score.toString() : ''
            });
            setIsModalOpen(true);
          };

          const handleSaveRegistration = (e) => {
            e.preventDefault();
            if (!isAdmin) return;

            if (!formState.school_name.trim() || !formState.participant_names.trim()) {
              alert("กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน");
              return;
            }

            const count = formState.participant_names.split('\n').filter(n => n.trim() !== '').length;
            const parsedScore = formState.score === '' ? null : parseFloat(formState.score);

            if (editingReg) {
              setRegistrations(prev => prev.map(r => r.id === editingReg.id ? {
                ...r,
                school_name: formState.school_name.trim(),
                activity_name: formState.activity_name,
                grade_level: formState.grade_level,
                activity_type: formState.activity_type,
                participant_count: count,
                participant_names: formState.participant_names,
                teacher_names: formState.teacher_names,
                score: parsedScore
              } : r));
            } else {
              const newReg = {
                id: `reg-${Date.now()}`,
                school_name: formState.school_name.trim(),
                activity_name: formState.activity_name,
                grade_level: formState.grade_level,
                activity_type: formState.activity_type,
                participant_count: count,
                participant_names: formState.participant_names,
                teacher_names: formState.teacher_names,
                registration_date: new Date().toISOString(),
                score: parsedScore
              };
              setRegistrations(prev => [newReg, ...prev]);
            }
            setIsModalOpen(false);
          };

          const handleDeleteRegistration = (id) => {
            if (!isAdmin) return;
            const confirmDelete = window.confirm("คุณต้องการลบข้อมูลรายการนี้ใช่หรือไม่?");
            if (confirmDelete) {
              setRegistrations(prev => prev.filter(r => r.id !== id));
            }
          };

          const handleCSVImportClick = () => {
            if (!isAdmin) return;
            setImportedRows([]);
            setCsvFileError('');
            setIsImportModalOpen(true);
          };

          const parseCSVText = (text) => {
            let lines = [];
            let row = [""];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
              let c = text[i];
              let next = text[i+1];
              if (c === '"') {
                if (inQuotes && next === '"') {
                  row[row.length - 1] += '"';
                  i++;
                } else {
                  inQuotes = !inQuotes;
                }
              } else if (c === ',' && !inQuotes) {
                row.push('');
              } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
              } else {
                row[row.length - 1] += c;
              }
            }
            if (row.length > 1 || row[0] !== '') {
              lines.push(row);
            }
            return lines;
          };

          const handleFileUpload = (e) => {
            if (!isAdmin) return;
            const file = e.target.files[0];
            if (!file) return;

            setCsvFileError('');
            const reader = new FileReader();
            reader.onload = (evt) => {
              try {
                const text = evt.target.result;
                const parsedData = parseCSVText(text);

                if (parsedData.length < 2) {
                  setCsvFileError('ไฟล์ไม่มีข้อมูลหรือรูปแบบไม่ถูกต้อง');
                  return;
                }

                const headers = parsedData[0].map(h => h.trim().toLowerCase());
                
                const colIndices = {
                  school_name: headers.indexOf('school_name'),
                  activity_name: headers.indexOf('activity_name'),
                  grade_level: headers.indexOf('grade_level'),
                  activity_type: headers.indexOf('activity_type'),
                  participant_count: headers.indexOf('participant_count'),
                  participant_names: headers.indexOf('participant_names'),
                  teacher_names: headers.indexOf('teacher_names'),
                  score: headers.indexOf('score')
                };

                if (colIndices.school_name === -1) {
                  colIndices.school_name = headers.findIndex(h => h.includes('โรงเรียน') || h.includes('school'));
                  colIndices.activity_name = headers.findIndex(h => h.includes('กิจกรรม') || h.includes('activity_name'));
                  colIndices.grade_level = headers.findIndex(h => h.includes('ระดับ') || h.includes('ชั้น') || h.includes('grade'));
                  colIndices.activity_type = headers.findIndex(h => h.includes('ประเภท') || h.includes('type'));
                  colIndices.participant_count = headers.findIndex(h => h.includes('จำนวน') || h.includes('count'));
                  colIndices.participant_names = headers.findIndex(h => h.includes('ชื่อผู้') || h.includes('นักเรียน') || h.includes('participant'));
                  colIndices.teacher_names = headers.findIndex(h => h.includes('ครู') || h.includes('ผู้ควบคุม') || h.includes('teacher'));
                  colIndices.score = headers.findIndex(h => h.includes('คะแนน') || h.includes('score'));
                }

                if (colIndices.school_name === -1) colIndices.school_name = 0;
                if (colIndices.activity_name === -1) colIndices.activity_name = 1;
                if (colIndices.grade_level === -1) colIndices.grade_level = 2;
                if (colIndices.activity_type === -1) colIndices.activity_type = 3;
                if (colIndices.participant_count === -1) colIndices.participant_count = 4;
                if (colIndices.participant_names === -1) colIndices.participant_names = 5;
                if (colIndices.teacher_names === -1) colIndices.teacher_names = 6;
                if (colIndices.score === -1) colIndices.score = 7;

                const formattedRows = [];
                for (let i = 1; i < parsedData.length; i++) {
                  const row = parsedData[i];
                  if (row.length < 2 || !row[colIndices.school_name]) continue;

                  const pCount = row[colIndices.participant_count] 
                    ? parseInt(row[colIndices.participant_count]) 
                    : (row[colIndices.participant_names] ? row[colIndices.participant_names].split('\n').filter(n => n.trim() !== '').length : 1);

                  const rawScore = row[colIndices.score];
                  const parsedScore = (rawScore !== undefined && rawScore !== null && rawScore.trim() !== '') ? parseFloat(rawScore) : null;

                  formattedRows.push({
                    id: `imported-${i}-${Date.now()}`,
                    school_name: row[colIndices.school_name] ? row[colIndices.school_name].trim() : '',
                    activity_name: row[colIndices.activity_name] ? row[colIndices.activity_name].trim() : 'คัดลายมือ',
                    grade_level: row[colIndices.grade_level] ? row[colIndices.grade_level].trim() : 'ป. ๔-๖',
                    activity_type: row[colIndices.activity_type] ? row[colIndices.activity_type].trim() : 'เดี่ยว',
                    participant_count: isNaN(pCount) ? 1 : pCount,
                    participant_names: row[colIndices.participant_names] ? row[colIndices.participant_names].trim() : '',
                    teacher_names: row[colIndices.teacher_names] ? row[colIndices.teacher_names].trim() : '',
                    registration_date: new Date().toISOString(),
                    score: parsedScore
                  });
                }

                if (formattedRows.length === 0) {
                  setCsvFileError('ไม่พบข้อมูลแถวผู้เข้าแข่งขันที่มีความถูกต้องในไฟล์');
                } else {
                  setImportedRows(formattedRows);
                }
              } catch (err) {
                setCsvFileError('เกิดข้อผิดพลาดในการอ่านไฟล์: ' + err.message);
              }
            };
            reader.readAsText(file, 'UTF-8');
          };

          const handleConfirmImport = () => {
            if (!isAdmin || importedRows.length === 0) return;
            if (importMode === 'overwrite') {
              setRegistrations(importedRows);
            } else {
              setRegistrations(prev => [...importedRows, ...prev]);
            }
            setIsImportModalOpen(false);
            alert(`นำเข้าข้อมูลสำเร็จรวมทั้งหมด ${importedRows.length} รายการ!`);
          };

          const [scoreInputs, setScoreInputs] = React.useState({});

          const handleScoreInputChange = (id, val) => {
            setScoreInputs(prev => ({ ...prev, [id]: val }));
          };

          const handleSaveSingleScore = (id) => {
            if (!isAdmin) return;
            const value = scoreInputs[id];
            if (value === undefined) return;

            if (value === '') {
              setRegistrations(prev => prev.map(r => r.id === id ? { ...r, score: null } : r));
              alert("ล้างคะแนนเรียบร้อยแล้ว");
              return;
            }

            const num = parseFloat(value);
            if (isNaN(num) || num < 0 || num > 100) {
              alert("กรุณากรอกคะแนนระหว่าง 0.00 ถึง 100.00");
              return;
            }

            setRegistrations(prev => prev.map(r => r.id === id ? { ...r, score: num } : r));
            const scoreElement = document.getElementById(`save-indicator-${id}`);
            if (scoreElement) {
              scoreElement.classList.remove('opacity-0');
              setTimeout(() => scoreElement.classList.add('opacity-0'), 2000);
            }
          };

          const handleCriteriaChange = (index, field, value) => {
            if (!isAdmin) return;
            const updated = [...awardCriteria];
            updated[index][field] = parseFloat(value) || 0;
            setAwardCriteria(updated);
          };

          const schoolMedalSummary = React.useMemo(() => {
            const summary = {};
            uniqueSchools.forEach(sch => {
              summary[sch] = { gold: 0, silver: 0, bronze: 0, consolation: 0, total: 0, participation: 0 };
            });

            registrations.forEach(r => {
              if (r.score !== null && r.score !== undefined) {
                const award = getAward(r.score);
                if (!summary[r.school_name]) {
                  summary[r.school_name] = { gold: 0, silver: 0, bronze: 0, consolation: 0, total: 0, participation: 0 };
                }
                if (award.id === 'gold') summary[r.school_name].gold += 1;
                else if (award.id === 'silver') summary[r.school_name].silver += 1;
                else if (award.id === 'bronze') summary[r.school_name].bronze += 1;
                else if (award.id === 'consolation') summary[r.school_name].consolation += 1;
                else if (award.id === 'participation') summary[r.school_name].participation += 1;

                if (['gold', 'silver', 'bronze', 'consolation'].includes(award.id)) {
                  summary[r.school_name].total += 1;
                }
              }
            });

            return Object.keys(summary).map(school => ({
              school_name: school,
              ...summary[school]
            })).sort((a, b) => {
              if (b.gold !== a.gold) return b.gold - a.gold;
              if (b.silver !== a.silver) return b.silver - a.silver;
              if (b.bronze !== a.bronze) return b.bronze - a.bronze;
              return b.total - a.total;
            });
          }, [registrations, awardCriteria, uniqueSchools]);

          return (
            <div className="min-h-screen bg-[#FDFBF7] text-slate-800 font-sans flex flex-col antialiased">
              <header className="bg-gradient-to-r from-[#801010] via-[#991B1B] to-[#B91C1C] text-white shadow-lg relative overflow-hidden no-print">
                <div className="absolute right-0 top-0 bottom-0 opacity-10 flex items-center select-none pointer-events-none">
                  <svg width="400" height="150" viewBox="0 0 400 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 0L100 50L50 100L0 50L50 0Z" fill="currentColor"/>
                    <path d="M150 0L200 50L150 100L100 50L150 0Z" fill="currentColor"/>
                    <path d="M250 50L300 100L250 150L200 100L250 50Z" fill="currentColor"/>
                    <path d="M350 20L400 70L350 120L300 70L350 20Z" fill="currentColor"/>
                  </svg>
                </div>
                
                <div className="max-w-7xl mx-auto px-4 py-6 md:py-8 flex flex-col md:flex-row md:items-center md:justify-between relative z-10">
                  <div>
                    <div className="flex items-center gap-3 mb-2">
                      <span className="bg-[#D4AF37] text-amber-950 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-inner">
                        การแข่งขันระดับเครือข่ายพัฒนาคุณภาพการศึกษาม่วงบึงแก
                      </span>
                      <span className="bg-white/10 text-white text-xs px-2 py-1 rounded border border-white/20">
                        ปีการศึกษา ๒๕๖๙
                      </span>
                    </div>
                    <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-b from-amber-100 via-amber-200 to-white drop-shadow-sm font-serif">
                      ระบบจัดการแข่งขันรักษ์ภาษาไทย
                    </h1>
                    <p className="text-red-100 text-sm md:text-base mt-1 font-light">
                      การประกวดทักษะและกิจกรรมทางภาษาเนื่องในสัปดาห์วันภาษาไทยแห่งชาติ
                    </p>
                  </div>
                  
                  <div className="mt-4 md:mt-0 flex flex-wrap gap-2 items-center">
                    {isAdmin ? (
                      <div className="flex items-center gap-2 bg-amber-500 text-amber-950 px-3.5 py-1.5 rounded-lg text-xs font-bold shadow-md">
                        <SVGIcon name="unlock" size={14} />
                        <span>สถานะ: ผู้ดูแลระบบ (Admin)</span>
                        <button 
                          onClick={handleLogout}
                          className="ml-2 bg-red-800 text-white p-1 rounded-md hover:bg-red-900 transition"
                          title="ออกจากระบบ"
                        >
                          <SVGIcon name="log-out" size={12} />
                        </button>
                      </div>
                    ) : (
                      <button 
                        onClick={handleOpenLoginModal} 
                        className="flex items-center gap-1.5 text-xs bg-white/15 text-white hover:bg-white/25 border border-white/20 px-3.5 py-2 rounded-lg font-bold transition shadow-xs"
                      >
                        <SVGIcon name="lock" size={14} />
                        <span>เข้าสู่ระบบ (สำหรับ Admin)</span>
                      </button>
                    )}
                    <div className="h-6 w-[1px] bg-white/20 hidden sm:block"></div>
                    <div className="text-right hidden sm:block text-xs text-red-200">
                      <p>ผู้ใช้ปัจจุบัน: {isAdmin ? 'ผู้ดูแลระบบ' : 'ผู้ชมทั่วไป'}</p>
                      <p className="font-bold text-[#D4AF37]">โหมด: {isAdmin ? 'จัดการข้อมูลสมบูรณ์' : 'ดูข้อมูลทั่วไป'}</p>
                    </div>
                  </div>
                </div>

                <div className="bg-[#590B0B] border-t border-red-950/40">
                  <div className="max-w-7xl mx-auto px-4">
                    <nav className="flex overflow-x-auto no-scrollbar py-2 gap-1">
                      <button 
                        onClick={() => { setActiveTab('dashboard'); setSelectedCertificate(null); }}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                          activeTab === 'dashboard' ? 'bg-[#FAF7F2] text-[#801010] shadow' : 'text-red-100 hover:bg-white/10'
                        }`}
                      >
                        <SVGIcon name="trending-up" size={16} /> แดชบอร์ดผลการแข่งขัน
                      </button>
                      
                      <button 
                        onClick={() => { setActiveTab('registration'); setSelectedCertificate(null); }}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                          activeTab === 'registration' ? 'bg-[#FAF7F2] text-[#801010] shadow' : 'text-red-100 hover:bg-white/10'
                        }`}
                      >
                        <SVGIcon name="users" size={16} /> {isAdmin ? 'จัดการลงทะเบียน' : 'ตรวจสอบรายชื่อลงทะเบียน'}
                      </button>
                      
                      <button 
                        onClick={() => { setActiveTab('scoring'); setSelectedCertificate(null); }}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                          activeTab === 'scoring' ? 'bg-[#FAF7F2] text-[#801010] shadow' : 'text-red-100 hover:bg-white/10'
                        }`}
                      >
                        <SVGIcon name="award" size={16} /> {isAdmin ? 'กรอกและบันทึกคะแนน' : 'ดูคะแนนผลการแข่งขัน'}
                      </button>
                      
                      <button 
                        onClick={() => { setActiveTab('reports'); setSelectedCertificate(null); }}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                          activeTab === 'reports' ? 'bg-[#FAF7F2] text-[#801010] shadow' : 'text-red-100 hover:bg-white/10'
                        }`}
                      >
                        <SVGIcon name="file-text" size={16} /> รายงานผลแยกส่วน
                      </button>
                      
                      <button 
                        onClick={() => { setActiveTab('announcement'); setSelectedCertificate(null); }}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                          activeTab === 'announcement' ? 'bg-[#FAF7F2] text-[#801010] shadow' : 'text-red-100 hover:bg-white/10'
                        }`}
                      >
                        <SVGIcon name="book-open" size={16} /> ประกาศผลและค้นหาเกียรติบัตร
                      </button>
                      
                      <button 
                        onClick={() => { setActiveTab('settings'); setSelectedCertificate(null); }}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium transition whitespace-nowrap ${
                          activeTab === 'settings' ? 'bg-[#FAF7F2] text-[#801010] shadow' : 'text-red-100 hover:bg-white/10'
                        }`}
                      >
                        <SVGIcon name="settings" size={16} /> เกณฑ์คะแนน {!isAdmin && '🔒'}
                      </button>
                    </nav>
                  </div>
                </div>
              </header>

              <main className="flex-1 max-w-7xl mx-auto px-4 py-8 w-full">
                {activeTab === 'dashboard' && (
                  <div className="space-y-6 animate-fadeIn">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                      <div className="bg-white p-5 rounded-xl border border-slate-150 shadow-sm flex items-center gap-4">
                        <div className="p-3.5 bg-red-50 text-red-700 rounded-lg">
                          <SVGIcon name="school" size={24} />
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-medium uppercase">สถาบันที่เข้าร่วม</p>
                          <p className="text-2xl font-bold text-slate-800">{uniqueSchools.length} โรงเรียน</p>
                        </div>
                      </div>

                      <div className="bg-white p-5 rounded-xl border border-slate-150 shadow-sm flex items-center gap-4">
                        <div className="p-3.5 bg-amber-50 text-[#D4AF37] rounded-lg">
                          <SVGIcon name="award" size={24} />
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-medium uppercase">กิจกรรมทั้งหมด</p>
                          <p className="text-2xl font-bold text-slate-800">{uniqueActivities.length} รายการ</p>
                        </div>
                      </div>

                      <div className="bg-white p-5 rounded-xl border border-slate-150 shadow-sm flex items-center gap-4">
                        <div className="p-3.5 bg-blue-50 text-blue-600 rounded-lg">
                          <SVGIcon name="users" size={24} />
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-medium uppercase">ผู้ลงทะเบียนทั้งหมด</p>
                          <p className="text-2xl font-bold text-slate-800">
                            {registrations.reduce((acc, curr) => acc + curr.participant_count, 0)} คน
                          </p>
                        </div>
                      </div>

                      <div className="bg-white p-5 rounded-xl border border-slate-150 shadow-sm flex items-center gap-4">
                        <div className="p-3.5 bg-emerald-50 text-emerald-600 rounded-lg">
                          <SVGIcon name="check" size={24} />
                        </div>
                        <div>
                          <p className="text-xs text-slate-500 font-medium uppercase">ประเมินคะแนนแล้ว</p>
                          <p className="text-2xl font-bold text-slate-800">
                            {registrations.filter(r => r.score !== null).length} / {registrations.length} รายการ
                          </p>
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                      {awardCriteria.map(crit => {
                        const count = registrations.filter(r => r.score !== null && getAward(r.score).id === crit.id).length;
                        return (
                          <div key={crit.id} className="bg-white px-4 py-3 rounded-lg border border-slate-150 shadow-xs flex justify-between items-center">
                            <span className="text-xs font-semibold text-slate-600">{crit.name} ({crit.min}-{crit.max})</span>
                            <span className="text-lg font-bold text-slate-900 bg-slate-100 px-2.5 py-0.5 rounded-full">{count}</span>
                          </div>
                        );
                      })}
                    </div>

                    <div className="bg-white rounded-xl border border-slate-150 shadow-sm overflow-hidden">

                                        <td className="px-4 py-3.5 font-bold text-slate-700">{reg.school_name}</td>
                                        <td className="px-4 py-3.5 text-slate-800 whitespace-pre-line font-mono">{reg.participant_names}</td>
                                        <td className="px-4 py-3.5 text-slate-500 whitespace-pre-line font-mono">{reg.teacher_names}</td>
                                        <td className="px-4 py-3.5 text-center font-bold text-slate-800">{reg.score !== null ? reg.score.toFixed(2) : '-'}</td>
                                        <td className="px-4 py-3.5 text-center">
                                          <span className={`inline-block px-2 py-0.5 rounded text-[11px] font-bold border ${award.color}`}>
                                            {award.name}
                                          </span>
                                        </td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'announcement' && (
                  <div className="space-y-6 animate-fadeIn">
                    <div className="bg-gradient-to-br from-[#801010] to-[#5a0b0b] text-white p-6 md:p-8 rounded-xl shadow-md space-y-4">
                      <div className="max-w-2xl mx-auto text-center space-y-2">
                        <h3 className="text-xl md:text-2xl font-bold font-serif text-transparent bg-clip-text bg-gradient-to-r from-amber-100 to-amber-300">
                          สืบค้นและดาวน์โหลดใบเกียรติบัตรการเข้าร่วมแข่งขัน
                        </h3>
                        <p className="text-xs text-red-100 font-light">
                          กรอกชื่อผู้เข้าแข่งขัน หรือชื่อโรงเรียน เพื่อสืบค้นผลการแข่งขันอย่างเป็นทางการ
                        </p>
                        <div className="relative pt-3">
                          <SVGIcon name="search" size={18} className="absolute left-4 top-7.5 text-slate-400" />
                          <input
                            type="text"
                            placeholder="พิมพ์ชื่อนักเรียน หรือชื่อโรงเรียนเพื่อค้นหารางวัล..."
                            value={publicSearch}
                            onChange={(e) => setPublicSearch(e.target.value)}
                            className="pl-11 pr-4 py-3 w-full border border-red-950/40 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 text-slate-800 text-base shadow-inner bg-white"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                      <div className="lg:col-span-5 bg-white p-5 rounded-xl border border-slate-150 shadow-sm space-y-4">
                        <h4 className="font-bold text-slate-800 border-b border-slate-100 pb-2 text-sm font-serif">
                          🔍 รายการผลรางวัลที่พบ ({registrations.filter(r => {
                            if (!publicSearch) return false;
                            return r.participant_names.includes(publicSearch) || r.school_name.includes(publicSearch);
                          }).length})
                        </h4>
                        
                        <div className="space-y-3 max-h-[480px] overflow-y-auto pr-2">
                          {publicSearch ? (
                            registrations.filter(r => {
                              return r.participant_names.toLowerCase().includes(publicSearch.toLowerCase()) || 
                                     r.school_name.toLowerCase().includes(publicSearch.toLowerCase());
                            }).map(r => {
                              const award = getAward(r.score);
                              const isSelected = selectedCertificate?.id === r.id;
                              return (
                                <div
                                  key={r.id}
                                  onClick={() => setSelectedCertificate(r)}
                                  className={`p-3 rounded-lg border text-left cursor-pointer transition ${
                                    isSelected 
                                      ? 'border-amber-500 bg-amber-50/60 shadow-xs' 
                                      : 'border-slate-150 hover:bg-slate-50'
                                  }`}
                                >
                                  <div className="flex justify-between items-start gap-1">
                                    <span className="font-bold text-xs text-slate-800">{r.activity_name}</span>
                                    <span className={`px-2 py-0.5 rounded text-[9px] font-bold border ${award.color}`}>
                                      {award.name}
                                    </span>
                                  </div>
                                  <p className="text-xs text-slate-500 mt-1 font-semibold">{r.school_name}</p>
                                  <p className="text-xs text-slate-700 mt-1 whitespace-pre-line font-mono font-medium">{r.participant_names}</p>
                                </div>
                              );
                            })
                          ) : (
                            <div className="text-center py-12 text-slate-400 text-xs">
                              กรุณากรอกข้อมูลในช่องค้นหาด้านบนเพื่อตรวจสอบรางวัล
                            </div>
                          )}
                        </div>
                      </div>

                      <div className="lg:col-span-7 bg-slate-100 p-5 rounded-xl border border-slate-200 flex flex-col items-center justify-center">
                        {selectedCertificate ? (
                          <div className="space-y-4 w-full flex flex-col items-center">
                            <div 
                              id="printable-certificate" 
                              className="bg-[#FDFCFA] border-8 border-amber-900/10 p-8 w-full max-w-2xl rounded shadow-lg relative aspect-[1.414/1] flex flex-col justify-between text-center overflow-hidden border-double"
                            >
                              <div className="absolute top-2 left-2 right-2 bottom-2 border border-amber-600/30 pointer-events-none"></div>
                              <div className="absolute top-4 left-4 right-4 bottom-4 border border-amber-600/10 pointer-events-none"></div>

                              <div className="space-y-2 mt-4 relative z-10">
                                <div className="text-center flex justify-center mb-1 text-2xl">
                                  
                                </div>
                                <h2 className="text-[#801010] text-lg font-bold font-serif tracking-widest">เครือข่ายคุณภาพการศึกษาม่วงบึงแก</h2>
                                <p className="text-xs font-semibold text-amber-800 tracking-wider">ขอมอบเกียรติบัตรฉบับนี้เพื่อแสดงว่า</p>
                              </div>

                              <div className="my-3 space-y-1 relative z-10">
                                <p className="text-lg font-bold text-slate-800 underline decoration-amber-600/40 whitespace-pre-line font-serif">
                                  {selectedCertificate.participant_names}
                                </p>
                                <p className="text-xs text-slate-600 font-semibold">{selectedCertificate.school_name}</p>
                              </div>

                              <div className="space-y-2 relative z-10 px-6">
                                <p className="text-xs font-medium text-slate-600">
                                  ได้รับรางวัล <span className="font-bold text-[#801010] underline">{getAward(selectedCertificate.score).name}</span>
                                </p>
                                <p className="text-xs font-bold text-slate-700">
                                  กิจกรรม: {selectedCertificate.activity_name} ({selectedCertificate.grade_level})
                                </p>
                                <p className="text-[11px] text-slate-500 leading-relaxed font-light">
                                  เนื่องในกิจกรรมโครงการรักษ์ภาษาไทยสัปดาห์วันภาษาไทยแห่งชาติ
                                  ให้ไว้ ณ วันที่ ๑๖ มิถุนายน พุทธศักราช ๒๕๖๙
                                </p>
                              </div>

                              <div className="mt-4 flex justify-around items-end px-12 relative z-10 text-slate-600">
                                <div className="text-center text-[10px]">
                                  <div className="border-t border-slate-300 w-32 mt-1 mx-auto"></div>
                                  <p className="mt-1 font-bold">(นายทองพูล บุญหล้า)</p>
                                  <p>หัวหน้าศูนย์เครือข่าย</p>
                                </div>
                                <div className="text-center text-[10px]">
                                  <div className="border-t border-slate-300 w-32 mt-1 mx-auto"></div>
                                  <p className="mt-1 font-bold">(นายอุทัย  ทองลุม)</p>
                                  <p>ประธานเครือข่ายคุณภาพการศึกษาม่วงบึงแก</p>
                                </div>
                              </div>
                            </div>

                            <button
                              onClick={() => {
                                const printContent = document.getElementById('printable-certificate').innerHTML;
                                const originalContent = document.body.innerHTML;
                                document.body.innerHTML = `
                                  <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: white; padding: 20px;">
                                    ${printContent}
                                  </div>
                                `;
                                window.print();
                                document.body.innerHTML = originalContent;
                                window.location.reload(); 
                              }}
                              className="flex items-center gap-1.5 bg-[#801010] hover:bg-[#6e0d0d] text-white px-5 py-2.5 rounded-lg text-sm font-semibold shadow transition"
                            >
                              <SVGIcon name="printer" size={16} /> พิมพ์เกียรติบัตรใบนี้
                            </button>
                          </div>
                        ) : (
                          <div className="text-center py-20 text-slate-400">
                            <p className="text-xs">กรุณาเลือกรายการจากการค้นหาด้านซ้ายเพื่อพรีวิวเกียรติบัตร</p>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div className="space-y-6 animate-fadeIn">
                    {isAdmin ? (
                      <div className="bg-white p-6 rounded-xl border border-slate-150 shadow-sm max-w-4xl mx-auto space-y-6">
                        <div className="border-b border-slate-100 pb-3 flex items-center justify-between">
                          <div>
                            <h3 className="text-lg font-bold text-slate-800 font-serif">ปรับแต่งเกณฑ์ตัดเหรียญรางวัล</h3>
                            <p className="text-xs text-slate-500">ปรับช่วงคะแนนของรางวัลตามความเหมาะสม</p>
                          </div>
                        </div>

                        <div className="space-y-4">
                          {awardCriteria.map((crit, index) => (
                            <div key={crit.id} className="grid grid-cols-1 sm:grid-cols-4 gap-4 items-center p-4 bg-[#FAF7F2] rounded-lg border border-slate-150">
                              <span className="font-bold text-slate-800 text-sm">🏆 {crit.name}</span>
                              <input
                                type="number"
                                value={crit.min}
                                onChange={(e) => handleCriteriaChange(index, 'min', e.target.value)}
                                className="w-full py-1 px-2 border rounded font-mono text-xs"
                              />
                              <input
                                type="number"
                                value={crit.max}
                                onChange={(e) => handleCriteriaChange(index, 'max', e.target.value)}
                                className="w-full py-1 px-2 border rounded font-mono text-xs"
                              />
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div className="bg-white p-12 rounded-xl text-center max-w-md mx-auto">
                        <p className="text-sm font-semibold">🔒 หน้าจอนี้สำหรับ Admin เท่านั้น</p>
                      </div>
                    )}
                  </div>
                )}
              </main>

              <footer className="bg-[#3D0808] text-red-100 py-6 text-xs text-center mt-auto space-y-1 no-print">
                <p className="font-serif">การแข่งขันกิจกรรมรักษ์ภาษาไทย • เครือข่ายคุณภาพการศึกษาม่วงบึงแก • admin ครูทองพูล  บุญหล้า</p>
              </footer>

              {isLoginModalOpen && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 z-50">
                  <div className="bg-white rounded-xl max-w-sm w-full overflow-hidden p-6 space-y-4 shadow-xl">
                    <h3 className="font-bold font-serif text-slate-800 text-base">เข้าสู่ระบบผู้ดูแลระบบ (Admin)</h3>
                    {loginError && <p className="text-xs text-red-600 font-bold">{loginError}</p>}
                    <form onSubmit={handleLoginSubmit} className="space-y-3">
                      <input 
                        type="text" 
                        placeholder="Username" 
                        value={loginUsername}
                        onChange={(e) => setLoginUsername(e.target.value)}
                        className="w-full p-2 border rounded text-sm"
                        required 
                      />
                      <input 
                        type="password" 
                        placeholder="Password" 
                        value={loginPassword}F
                        onChange={(e) => setLoginPassword(e.target.value)}
                        className="w-full p-2 border rounded text-sm"
                        required 
                      />
                      <div className="flex justify-end gap-2 pt-2">
                        <button type="button" onClick={() => setIsLoginModalOpen(false)} className="px-3 py-1.5 border rounded text-xs">ยกเลิก</button>
                        <button type="submit" className="px-3 py-1.5 bg-red-700 text-white rounded text-xs font-semibold">เข้าสู่ระบบ</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {isModalOpen && isAdmin && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 overflow-y-auto">
                  <div className="bg-white rounded-xl max-w-lg w-full p-6 space-y-4">
                    <h3 className="font-bold font-serif text-slate-800">{editingReg ? '📝 แก้ไขลงทะเบียน' : '➕ ลงทะเบียนกิจกรรมใหม่'}</h3>
                    <form onSubmit={handleSaveRegistration} className="space-y-3 text-xs font-medium">
                      <input 
                        type="text" 
                        placeholder="ชื่อโรงเรียน" 
                        value={formState.school_name} 
                        onChange={(e) => setFormState({...formState, school_name: e.target.value})} 
                        className="w-full p-2 border rounded" 
                        required 
                      />
                      <div className="grid grid-cols-2 gap-2">
                        <select value={formState.activity_name} onChange={(e) => setFormState({...formState, activity_name: e.target.value})} className="p-2 border rounded">
                          {INITIAL_ACTIVITIES.map(act => <option key={act} value={act}>{act}</option>)}
                        </select>
                        <select value={formState.grade_level} onChange={(e) => setFormState({...formState, grade_level: e.target.value})} className="p-2 border rounded">
                          {INITIAL_GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                        </select>
                      </div>
                      <textarea 
                        placeholder="รายชื่อผู้เข้าแข่งขัน (ขึ้นบรรทัดใหม่)" 
                        value={formState.participant_names} 
                        onChange={(e) => setFormState({...formState, participant_names: e.target.value})} 
                        className="w-full p-2 border rounded font-mono" 
                        rows={3} 
                        required 
                      />
                      <textarea 
                        placeholder="รายชื่อครูผู้ฝึกสอน" 
                        value={formState.teacher_names} 
                        onChange={(e) => setFormState({...formState, teacher_names: e.target.value})} 
                        className="w-full p-2 border rounded font-mono" 
                        rows={2} 
                      />
                      <div className="flex justify-end gap-2 pt-2">
                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 border rounded">ยกเลิก</button>
                        <button type="submit" className="px-4 py-2 bg-emerald-600 text-white rounded font-bold">บันทึกข้อมูล</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {isImportModalOpen && isAdmin && (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 overflow-y-auto">
                  <div className="bg-white rounded-xl max-w-2xl w-full p-6 space-y-4">
                    <h3 className="font-bold font-serif text-slate-800 text-sm">📥 นำเข้าข้อมูลด้วยไฟล์ CSV</h3>
                    <input type="file" accept=".csv" onChange={handleFileUpload} className="w-full p-2 border text-xs" />
                    {csvFileError && <p className="text-xs text-red-600">{csvFileError}</p>}
                    
                    {importedRows.length > 0 && (
                      <div className="space-y-3">
                        <p className="text-xs font-semibold text-emerald-700">✓ ตรวจพบข้อมูล {importedRows.length} รายการพร้อมนำเข้า</p>
                        <div className="flex gap-4 text-xs font-semibold">
                          <label><input type="radio" checked={importMode === 'append'} onChange={() => setImportMode('append')} /> นำเข้าต่อท้าย</label>
                          <label><input type="radio" checked={importMode === 'overwrite'} onChange={() => setImportMode('overwrite')} /> เขียนทับข้อมูลเดิม</label>
                        </div>
                      </div>
                    )}
                    
                    <div className="flex justify-end gap-2 pt-2">
                      <button type="button" onClick={() => setIsImportModalOpen(false)} className="px-3 py-1.5 border rounded text-xs">ปิด</button>
                      <button type="button" disabled={importedRows.length === 0} onClick={handleConfirmImport} className="px-3 py-1.5 bg-amber-600 text-white rounded text-xs font-semibold disabled:bg-slate-200">ยืนยันการนำเข้า</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
